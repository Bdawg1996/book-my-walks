<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Book My Walks</title>
    <meta name="theme-color" content="#1B4332">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: #FDFAF5; color: #1A1A1A; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .container { max-width: 400px; width: 100%; }
        .logo { font-size: 1.4rem; font-weight: 800; color: #1B4332; text-decoration: none; display: block; text-align: center; margin-bottom: 32px; }
        .logo span { margin-right: 6px; }
        h1 { text-align: center; font-size: 1.8rem; font-weight: 700; color: #1B4332; margin-bottom: 8px; }
        .sub { text-align: center; color: #666; margin-bottom: 32px; font-size: 0.95rem; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 7px; font-weight: 600; font-size: 0.9rem; color: #444; }
        input { width: 100%; padding: 13px 16px; border: 2px solid #D8F3DC; border-radius: 10px; font-size: 1rem; font-family: 'Outfit', sans-serif; background: #fff; color: #1A1A1A; transition: border-color 0.2s; }
        input:focus { outline: none; border-color: #1B4332; }
        .btn { display: block; width: 100%; padding: 15px; background: #1B4332; color: #fff; border: none; border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: opacity 0.2s; font-family: 'Outfit', sans-serif; margin-top: 8px; }
        .btn:hover { opacity: 0.85; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .error { background: #FEF2F2; color: #DC2626; padding: 12px; border-radius: 8px; margin-bottom: 16px; font-size: 0.9rem; display: none; }
        .signup-link { text-align: center; color: #888; font-size: 0.9rem; margin-top: 20px; }
        .signup-link a { color: #1B4332; font-weight: 600; }
        .back-link { display: block; text-align: center; color: #666; text-decoration: none; font-size: 0.9rem; margin-bottom: 24px; }
        .back-link:hover { color: #1B4332; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="logo">🐾 Book My Walks</a>

        <h1>Welcome back.</h1>
        <p class="sub">Sign in to manage your walker page.</p>

        <div id="errorBox" class="error"></div>

        <form id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Your password" required>
            </div>
            <button type="submit" class="btn" id="submitBtn">Sign In →</button>
        </form>

        <p class="signup-link">Don't have an account? <a href="signup.html">Create one</a></p>
        <a href="/" class="back-link">← Back to Book My Walks</a>
    </div>

    <script>
        const SUPABASE_URL = 'https://anvwngvmtwfzwvyzojhr.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFudnduZ3ZtdHdmend2eXpvamhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMzE3OTAsImV4cCI6MjA4NzgwNzc5MH0.PIHgghMQj_aIcwLgoKpzwT8GSmq2kS5Q7Xumug1W7-w';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const errBox = document.getElementById('errorBox');
            errBox.style.display = 'none';
            btn.disabled = true;
            btn.textContent = 'Signing in...';

            try {
                const { error } = await supabaseClient.auth.signInWithPassword({
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value
                });
                if (error) throw error;
                window.location.href = 'dashboard.html';
            } catch (err) {
                errBox.textContent = err.message || 'Invalid email or password.';
                errBox.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Sign In →';
            }
        });
    </script>
</body>
</html>
